<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
      textarea { width: 100%; height: 300px; font-family: monospace; }
      button { margin-top: 10px; padding: 10px 20px; cursor: pointer; background: #4285f4; color: white; border: none; border-radius: 4px; }
      button:hover { background: #357ae8; }
      #status { margin-top: 15px; padding: 10px; font-weight: bold; }
      .info { font-size: 0.9em; color: #666; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <h2>Garoon予定同期ツール</h2>

    <div class="info">
      Garoonからエクスポートした<b>「テキスト形式」</b>または<b>「CSV形式」</b>の中身を貼り付けてください。
    </div>

    <label>
      基準年（テキスト形式時のみ使用）：
      <input type="number" id="year" style="width:6em">
    </label>

    <br><br>

    <textarea id="input" placeholder="ここに貼り付けてください..."></textarea><br>
    <button onclick="sync()">Googleカレンダーに登録</button>

    <div id="status"></div>

    <script>
      document.getElementById("year").value = new Date().getFullYear();

      function sync() {
        const text = document.getElementById("input").value;
        const year = parseInt(document.getElementById("year").value, 10);
        
        if (!text.trim()) {
          alert("テキストを入力してください");
          return;
        }

        const statusDiv = document.getElementById("status");
        statusDiv.textContent = "処理中…";
        statusDiv.style.color = "blue";

        google.script.run
          .withSuccessHandler(msg => {
            statusDiv.textContent = msg;
            statusDiv.style.color = "green";
          })
          .withFailureHandler(err => {
            statusDiv.textContent = "エラー: " + err.message;
            statusDiv.style.color = "red";
          })
          .syncSchedule(text, year);
      }
    </script>
  </body>
</html>
