<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: sans-serif; margin: 20px; }
      textarea { width: 100%; height: 300px; }
      button { margin-top: 10px; padding: 8px 16px; }
      #status { margin-top: 10px; color: green; }
    </style>
  </head>
  <body>
    <h2>サイボウズ予定表 → Googleカレンダー</h2>

    <p>サイボウズからエクスポートした予定表テキストを貼り付けてください。</p>

    <textarea id="input"></textarea><br>
    <button onclick="sync()">Googleカレンダーに登録</button>

    <div id="status"></div>

    <script>
      function sync() {
        const text = document.getElementById("input").value;
        document.getElementById("status").textContent = "処理中…";

        google.script.run
          .withSuccessHandler(msg => {
            document.getElementById("status").textContent = msg;
          })
          .withFailureHandler(err => {
            document.getElementById("status").textContent = "エラー: " + err.message;
          })
          .syncSchedule(text);
      }
    </script>
  </body>
</html>
